<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheduly - Deadline Tugas</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#6C63FF,#4B44D4);
    min-height:100vh;
}

.container{
    display:flex;
}

.sidebar{
    width:250px;
    height:100vh;
    background:white;
    padding:30px 20px;
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo img{
    width:130px;
}

.menu a{
    display:block;
    padding:15px;
    margin:10px 0;
    text-decoration:none;
    color:#333;
    border-radius:12px;
    font-weight:bold;
}

.menu a.active,
.menu a:hover{
    background:#6C63FF;
    color:white;
}

.main{
    flex:1;
    padding:30px;
}

.topbar{
    background:white;
    padding:20px 30px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.add-btn{
    background:#6C63FF;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.card{
    background:white;
    border-radius:20px;
    box-shadow:8px 8px 0 black;
    overflow:hidden;
}

.card-header{
    background:#4B44D4;
    color:white;
    padding:18px;
    font-size:20px;
    font-weight:bold;
}

.task-list{
    padding:20px;
}

.task-item{
    background:#f5f6ff;
    padding:18px;
    border-radius:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.task-title{
    font-weight:bold;
    font-size:18px;
}

.task-date{
    color:#6C63FF;
    font-weight:bold;
}

.done{
    color:green;
    font-weight:bold;
}

.progress{
    color:orange;
    font-weight:bold;
}

.pending{
    color:red;
    font-weight:bold;
}

button.action{
    border:none;
    background:#6C63FF;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
    margin-left:8px;
}
</style>
</head>
<body>

<div class="container">

<div class="sidebar">
    <div class="logo">
        <img src="logo fiks.png">
    </div>

    <div class="menu">
        <a href="home.html">🏠 Home</a>
        <a href="jadwal.html">📅 Jadwal</a>
        <a href="#" class="active">📝 Deadline Tugas</a>
        <a href="login.html">🚪 Logout</a>
    </div>
</div>

<div class="main">

    <div class="topbar">
        <h1>Deadline Tugas</h1>
        <button class="add-btn"
        onclick="window.location.href='tambah-deadline.html'">
            + Tambah Tugas
        </button>
    </div>

    <div class="card">
        <div class="card-header">📝 Daftar Deadline</div>
        <div class="task-list" id="taskList"></div>
    </div>

</div>
</div>

<script>
function getStatusClass(status){
    if(status === "Sudah Selesai") return "done";
    if(status === "Sedang Dikerjakan") return "progress";
    return "pending";
}

function loadTasks(){
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let list = document.getElementById("taskList");

    list.innerHTML = "";

    if(tasks.length === 0){
        list.innerHTML = "<p>Belum ada tugas.</p>";
        return;
    }

    tasks.forEach((task,index)=>{
        list.innerHTML += `
        <div class="task-item">
            <div>
                <div class="task-title">${task.title}</div>
                <div>${task.subject}</div>
                <div class="task-date">${task.date}</div>
            </div>

            <div>
                <span class="${getStatusClass(task.status)}">
                    ${task.status}
                </span>

                <button class="action"
                onclick="editTask(${index})">✏️</button>

                <button class="action"
                onclick="deleteTask(${index})">🗑️</button>
            </div>
        </div>`;
    });
}

function editTask(index){
    localStorage.setItem("editTask", index);
    window.location.href = "tambah-deadline.html";
}

function deleteTask(index){
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.splice(index,1);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    loadTasks();
}

window.onload = loadTasks;
</script>

</body>
</html>
