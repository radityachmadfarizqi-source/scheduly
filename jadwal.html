<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheduly - Jadwal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#6C63FF,#4B44D4);
    min-height:100vh;
}

.container{
    display:flex;
}

.sidebar{
    width:250px;
    height:100vh;
    background:white;
    padding:30px 20px;
    box-shadow:5px 0 20px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo img{
    width:130px;
}

.logo h2{
    color:#2563eb;
    margin-top:10px;
}

.menu a{
    display:block;
    padding:15px;
    margin:10px 0;
    text-decoration:none;
    color:#333;
    border-radius:12px;
    font-weight:bold;
}

.menu a:hover,
.menu a.active{
    background:#6C63FF;
    color:white;
}

.main{
    flex:1;
    padding:30px;
}

.topbar{
    background:white;
    padding:20px 30px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.topbar h1{
    color:#333;
}

.add-btn{
    background:#6C63FF;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.add-btn:hover{
    background:#554de6;
}

.card{
    background:white;
    border-radius:20px;
    outline:3px solid (#4B44D4);
    box-shadow:8px 8px 0 black;
    overflow:hidden;
}

.card-header{
    background:#4B44D4;
    color:white;
    padding:18px;
    font-size:20px;
    font-weight:bold;
}

.schedule-list{
    padding:25px;
}

.schedule-item{
    background:#f5f6ff;
    padding:18px;
    border-radius:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.subject{
    font-weight:bold;
    color:#333;
}

.time{
    color:#6C63FF;
    font-weight:bold;
}

.room{
    color:gray;
    font-size:14px;
}

.schedule-item button{
    background:#6C63FF;
    color:white;
    border:none;
    width:38px;
    height:38px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.schedule-item button:hover{
    background:#554de6;
}

.topbar{
    background:white;
    padding:20px 30px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.topbar-actions{
    display:flex;
    align-items:center;
    gap:16px;
}

.add-btn{
    background:#6C63FF;
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;
}

#filterDay{
    padding:14px 18px;
    border:2px solid #ddd;
    border-radius:14px;
    font-weight:bold;
    min-width:150px;
    cursor:pointer;
}

#filterDay{
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    border:none;
    font-weight:bold;
}

.delete-btn{
    background:#ef4444;
}

.delete-btn:hover{
    background:#dc2626;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 1024px){
    .cards{
        grid-template-columns:1fr;
    }

    .topbar{
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
    }
}

@media (max-width: 768px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
        padding:20px;
    }

    .logo img{
        width:90px;
    }

    .menu{
        display:flex;
        justify-content:space-around;
        flex-wrap:wrap;
        gap:10px;
    }

    .menu a{
        flex:1;
        text-align:center;
        min-width:120px;
    }

    .main{
        padding:15px;
    }

    .topbar{
        padding:18px;
        border-radius:16px;
    }

    .topbar h1{
        font-size:24px;
    }

    .welcome{
        padding:20px;
    }

    .cards{
        grid-template-columns:1fr;
        gap:15px;
    }

    .card{
        width:100%;
    }

    .add-btn{
        width:100%;
    }

    #filterDay{
        width:100%;
    }

    .schedule-item,
    .task-item{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }
}

@media (max-width: 480px){

    .topbar h1{
        font-size:20px;
    }

    .welcome h2{
        font-size:20px;
    }

    .card-header{
        font-size:16px;
    }

    .profile{
        width:100%;
        text-align:center;
    }

    input, select, button{
        font-size:14px;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="sidebar">
        <div class="logo">
            <img src="logo fiks.png" alt="Scheduly Logo">
        </div>

        <div class="menu">
            <a href="home.html">🏠 Home</a>
            <a href="#" class="active">📅 Jadwal</a>
            <a href="deadline.html">📢 Deadline</a>
            <a href="login.html">🚪 Logout</a>
        </div>
    </div>

    <div class="main">

        <div class="topbar">
    <h1>Jadwal Pelajaran</h1>

    <div class="topbar-actions">
    <button class="add-btn" onclick="window.location.href='tambah-jadwal.html'">
        + Tambah Jadwal
    </button>

    <select id="filterDay" onchange="loadSchedules()">
        <option value="Semua">Semua Hari</option>
        <option value="Senin">Senin</option>
        <option value="Selasa">Selasa</option>
        <option value="Rabu">Rabu</option>
        <option value="Kamis">Kamis</option>
        <option value="Jumat">Jumat</option>
    </select>
    </div>
</div>

<div class="card">
    <div class="card-header">📚 Jadwal Minggu Ini</div>
    <div class="schedule-list" id="scheduleList"></div>
</div>

    </div>

</div>

<script>
function loadSchedules(){
    const schedules = JSON.parse(localStorage.getItem("schedules")) || [];
    const list = document.getElementById("scheduleList");
    const selectedDay = document.getElementById("filterDay").value;

    list.innerHTML = "";

    const filtered = selectedDay === "Semua"
        ? schedules
        : schedules.filter(s => s.day === selectedDay);

    if(filtered.length === 0){
        list.innerHTML = `
            <div class="schedule-item">
                <div>
                    <div class="subject">Tidak ada jadwal</div>
                    <div class="room">Hari ${selectedDay}</div>
                </div>
            </div>
        `;
        return;
    }

    filtered.forEach((schedule,index)=>{
        list.innerHTML += `
            <div class="schedule-item">
                <div>
                    <div class="subject">${schedule.subject}</div>
                    <div class="room">${schedule.room} • ${schedule.day}</div>
                </div>

                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="time">${schedule.time}</div>
                    <button onclick="editSchedule(${index})">✏️</button>
                    <button class="delete-btn" onclick="deleteSchedule(${index})">🗑️</button>
                </div>
            </div>
        `;
    });
}

function editSchedule(index){
    localStorage.setItem("editIndex", index);
    window.location.href = "tambah-jadwal.html";
}

function deleteSchedule(index){
    let schedules = JSON.parse(localStorage.getItem("schedules")) || [];

    if(confirm("Yakin mau hapus jadwal ini?")){
        schedules.splice(index, 1);
        localStorage.setItem("schedules", JSON.stringify(schedules));
        loadSchedules();
    }
}

window.onload = loadSchedules;
</script>

</body>
</html>
