<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheduly Daftar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background: linear-gradient(135deg, #6C63FF, #4B44D4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:1000px;
    height:650px;
    background:white;
    border-radius:25px;
    display:flex;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    position:relative;
}

.container::after{
    content:"";
    position:absolute;
    top:80px;
    bottom:80px;
    left:50%;
    width:2px;
    background:linear-gradient(to bottom, transparent, #6C63FF, transparent);
}

.left{
    width:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.logo img{
    width:520px;
    height:520px;
    object-fit:contain;
    margin-bottom:20px;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.25));
}

.left h1{
    font-size:48px;
    color:#2563eb;
}

.left p{
    color:#666;
    margin-top:10px;
}

.right{
    width:50%;
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.right h2{
    font-size:36px;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #ddd;
    border-radius:12px;
    font-size:16px;
}

input:focus{
    border-color:#6C63FF;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    background:#6C63FF;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#554de6;
}

.footer{
    margin-top:20px;
    text-align:center;
}

.footer a{
    color:#6C63FF;
    text-decoration:none;
    font-weight:bold;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 1024px){
    .cards{
        grid-template-columns:1fr;
    }

    .topbar{
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
    }
}

@media (max-width: 768px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
        padding:20px;
    }

    .logo img{
        width:90px;
    }

    .menu{
        display:flex;
        justify-content:space-around;
        flex-wrap:wrap;
        gap:10px;
    }

    .menu a{
        flex:1;
        text-align:center;
        min-width:120px;
    }

    .main{
        padding:15px;
    }

    .topbar{
        padding:18px;
        border-radius:16px;
    }

    .topbar h1{
        font-size:24px;
    }

    .welcome{
        padding:20px;
    }

    .cards{
        grid-template-columns:1fr;
        gap:15px;
    }

    .card{
        width:100%;
    }

    .add-btn{
        width:100%;
    }

    #filterDay{
        width:100%;
    }

    .schedule-item,
    .task-item{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }
}

@media (max-width: 480px){

    .topbar h1{
        font-size:20px;
    }

    .welcome h2{
        font-size:20px;
    }

    .card-header{
        font-size:16px;
    }

    .profile{
        width:100%;
        text-align:center;
    }

    input, select, button{
        font-size:14px;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="left">
        <div class="logo">
            <img src="logo fiks.png" alt="Scheduly Logo">
        </div>
    </div>

    <div class="right">
        <h2>Daftar</h2>

        <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Masukkan nama">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Masukkan email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Masukkan password">
        </div>

        <button onclick="daftar()">Daftar</button>

        <div class="footer">
            Sudah punya akun? 
            <a href="index.html">Login</a>
        </div>
    </div>

</div>

<script>
function daftar(){
    alert("Akun berhasil dibuat!");
    window.location.href="login.html";
}
</script>

</body>
</html>
