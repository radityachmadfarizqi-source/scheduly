<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheduly - Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background: linear-gradient(135deg,#6C63FF,#7770ff);
    min-height:100vh;
}

.container{
    display:flex;
}

.sidebar{
    width:250px;
    height:100vh;
    background:white;
    padding:30px 20px;
    box-shadow:5px 0 20px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo img{
    width:130px;
}

.logo h2{
    color:#2563eb;
    margin-top:10px;
}

.menu a{
    display:block;
    padding:15px;
    margin:10px 0;
    text-decoration:none;
    color:#333;
    border-radius:12px;
    transition:0.3s;
    font-weight:bold;
}

.menu a:hover,
.menu a.active{
    background:#7770f3;
    color:white;
}

.main{
    flex:1;
    padding:30px;
}

.topbar{
    background:white;
    padding:20px 30px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.topbar h1{
    color:#333;
}

.profile{
    background:#6C63FF;
    color:white;
    padding:10px 18px;
    border-radius:12px;
}

.welcome{
    background:white;
    padding:30px;
    border-radius:20px;
    margin-bottom:25px;
}

.welcome h2{
    color:#333;
}

.welcome p{
    color:gray;
    margin-top:10px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    outline:3px solid (#4B44D4);
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.card h3{
    margin-bottom:15px;
    color:#333;
}

.schedule-item{
    padding:10px;
    background:#f5f6ff;
    border-radius:12px;
    margin-bottom:10px;
}

.announcement{
    color:#666;
    margin-bottom:10px;
}

.stat{
    font-size:40px;
    color:#6C63FF;
    font-weight:bold;
}

.card-header{
    background:#4B44D4;
    color:white;
    padding:15px;
    margin:-25px -25px 20px -25px;
    border-radius:20px 20px 0 0;
    font-weight:bold;
    font-size:18px;
}

.task-item{
    background:#f5f6ff;
    padding:14px 16px;
    border-radius:12px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:bold;
}

.task-item small{
    background:#6C63FF;
    color:white;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
}

.schedule-item-home{
    background:#f5f6ff;
    padding:14px 16px;
    border-radius:12px;
    margin-bottom:12px;
    font-weight:bold;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 1024px){
    .cards{
        grid-template-columns:1fr;
    }

    .topbar{
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
    }
}

@media (max-width: 768px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
        padding:20px;
    }

    .logo img{
        width:90px;
    }

    .menu{
        display:flex;
        justify-content:space-around;
        flex-wrap:wrap;
        gap:10px;
    }

    .menu a{
        flex:1;
        text-align:center;
        min-width:120px;
    }

    .main{
        padding:15px;
    }

    .topbar{
        padding:18px;
        border-radius:16px;
    }

    .topbar h1{
        font-size:24px;
    }

    .welcome{
        padding:20px;
    }

    .cards{
        grid-template-columns:1fr;
        gap:15px;
    }

    .card{
        width:100%;
    }

    .add-btn{
        width:100%;
    }

    #filterDay{
        width:100%;
    }

    .schedule-item,
    .task-item{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }
}

@media (max-width: 480px){

    .topbar h1{
        font-size:20px;
    }

    .welcome h2{
        font-size:20px;
    }

    .card-header{
        font-size:16px;
    }

    .profile{
        width:100%;
        text-align:center;
    }

    input, select, button{
        font-size:14px;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="sidebar">
        <div class="logo">
            <img src="logo fiks.png" alt="Scheduly Logo">
        </div>

        <div class="menu">
            <a href="#" class="active">🏠 Home</a>
            <a href="jadwal.html">📅 Jadwal</a>
            <a href="deadline.html">📝 Deadline</a>
            <a href="index.html">🚪 Logout</a>
        </div>
    </div>

    <div class="main">

        <div class="topbar">
            <h1>Dashboard</h1>
            <div class="profile" id="profileName"></div>
        </div>

        <div class="welcome">
            <h2>Selamat Datang di Scheduly 👋</h2>
            <p>Atur jadwal sekolahmu agar lebih terorganisir dan produktif.</p>
        </div>

        <div class="card">
            <div class="card-header">📚 Jadwal Hari Ini</div>
            <div class="card-content" id="todaySchedule"></div>
        </div>

        <div class="card">
            <div class="card-header">📝 Deadline Tugas</div>
            <div class="card-content" id="homeTaskList"></div>
        </div>

    </div>
</div>

        </div>

    </div>

</div>

<script>
function loadTodaySchedule(){
    const schedules = JSON.parse(localStorage.getItem("schedules")) || [];
    const container = document.getElementById("todaySchedule");

    const days = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const today = days[new Date().getDay()];

    const todaySchedules = schedules.filter(s => s.day === today);

    container.innerHTML = "";

    if(todaySchedules.length === 0){
        container.innerHTML = `
            <div class="schedule-item-home">
                Tidak ada jadwal hari ini
            </div>
        `;
        return;
    }

    todaySchedules.forEach(schedule=>{
        container.innerHTML += `
            <div class="schedule-item-home">
                ${schedule.time} - ${schedule.subject}
            </div>
        `;
    });
}

function loadHomeTasks(){
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let list = document.getElementById("homeTaskList");

    list.innerHTML = "";

    if(tasks.length === 0){
        list.innerHTML = "<p>Belum ada deadline tugas</p>";
        return;
    }

    let recentTasks = tasks.slice(-3).reverse();

    recentTasks.forEach(task => {
        let statusEmoji = "🔴";

        if(task.status === "Sedang Dikerjakan"){
            statusEmoji = "🟡";
        } else if(task.status === "Sudah Selesai"){
            statusEmoji = "🟢";
        }

        list.innerHTML += `
            <div style="
                background:#f5f6ff;
                padding:15px;
                border-radius:12px;
                margin-bottom:12px;
            ">
                <strong>${task.title}</strong><br>
                <small>${task.subject}</small><br>
                <small>📅 ${task.date}</small><br>
                <small>${statusEmoji} ${task.status}</small>
            </div>
        `;
    });
}

function loadProfile(){
    const username = localStorage.getItem("username") || "User";
    document.getElementById("profileName").innerText = username;
}

window.onload = function(){
    loadTodaySchedule();
    loadHomeTasks();
    loadProfile();
}

</script>

</body>
</html>
